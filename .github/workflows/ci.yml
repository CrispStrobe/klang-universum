name: CI

# Analyze + test on every push to main and every PR. The app has a path
# dependency on the sibling `crisp_notation` library (../crisp_notation), so we lay the
# two repos out as siblings in the workspace and run from within this one.

on:
  push:
    branches: [main]
  pull_request:

# Group per PR (a new push to a PR cancels its superseded run) but per COMMIT on
# main (github.sha is unique, so main pushes are NEVER cancelled — every commit
# runs a full CI to completion, in parallel). During heavy multi-agent
# development a single `group: ${{ github.ref }}` made rapid main pushes cancel
# each other, so regressions reached main with their validating run cancelled
# (never green, never red — just "cancelled"). Per-SHA on main fixes that.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cometbeat
        uses: actions/checkout@v5
        with:
          path: cometbeat

      # crisp_notation + crisp_notation_core are resolved via ../crisp_notation/... path deps.
      - name: Checkout crisp_notation (sibling path dependency)
        uses: actions/checkout@v5
        with:
          repository: CrispStrobe/crisp_notation
          ref: main
          path: crisp_notation

      # crispembed is a native FFI path dep (../CrispEmbed/flutter/crispembed);
      # pub get needs the sibling present even where the plugin isn't built.
      - name: Checkout CrispEmbed (sibling FFI path dependency)
        uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispEmbed
          ref: main
          path: CrispEmbed

      # onnx_runtime_dart is a dev_dependency (headless AECMOS eval in bin/); pub
      # get resolves dev deps, so the sibling must be present even for app builds.
      - name: Checkout onnx_runtime_dart (sibling dev path dependency)
        uses: actions/checkout@v5
        with:
          repository: CrispStrobe/onnx_runtime_dart
          ref: main
          path: onnx_runtime_dart

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: cometbeat
        run: flutter pub get

      - name: Verify formatting
        working-directory: cometbeat
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        working-directory: cometbeat
        run: flutter analyze

      - name: Test
        working-directory: cometbeat
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: lcov
          path: cometbeat/coverage/lcov.info
          if-no-files-found: warn

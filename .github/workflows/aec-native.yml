name: aec-native

# Builds + tests the standalone native AEC Flutter FFI plugin (native/aec/) on
# all three desktop OSes. Separate from the app CI (ci.yml): the plugin is not a
# dependency of the app yet (AEC_TIER3B.md CI-safety rule), so its cross-platform
# C portability + plugin packaging are verified here with no risk to the app.
# Only runs when the plugin itself changes.

on:
  push:
    paths:
      - 'native/aec/**'
      - '.github/workflows/aec-native.yml'
  pull_request:
    paths:
      - 'native/aec/**'
      - '.github/workflows/aec-native.yml'

concurrency:
  group: aec-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) C portability + AEC correctness: build the standalone lib via the
  #    top-level CMake and run the offline ERLE + engine tests against it.
  lib-and-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: native/aec
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build standalone lib (aec_dsp + aec)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - run: flutter pub get
      - name: Offline tests (ERLE + engine)
        # The tests auto-locate build/libaec(.so|.dylib) or build/Release/aec.dll.
        run: flutter test

  # 2) Plugin packaging: generate a throwaway example app that depends on the
  #    plugin and build it for each target — this compiles + links the plugin's
  #    real per-platform build files (podspec / src CMake / gradle NDK). Covers
  #    all five platforms: the three desktops + iOS + Android.
  example-build:
    name: example-build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   name: macos,   create: macos,   build: "macos --debug",             desktop: macos }
          - { os: ubuntu-latest,  name: linux,   create: linux,   build: "linux --debug",             desktop: linux }
          - { os: windows-latest, name: windows, create: windows, build: "windows --debug",           desktop: windows }
          - { os: macos-latest,   name: ios,     create: ios,     build: "ios --debug --no-codesign", desktop: "" }
          - { os: ubuntu-latest,  name: android, create: android, build: "apk --debug",               desktop: "" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Linux desktop build deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config
      - name: Generate example, add plugin, build (${{ matrix.name }})
        shell: bash
        run: |
          if [ -n "${{ matrix.desktop }}" ]; then
            flutter config --enable-${{ matrix.desktop }}-desktop
          fi
          # Forward slashes: on Windows the runner paths use backslashes, which
          # are invalid JSON escapes inside `pub add`'s inline dependency map.
          EXDIR="${RUNNER_TEMP//\\//}/aec_example"
          PLUGIN_PATH="${GITHUB_WORKSPACE//\\//}/native/aec"
          flutter create --template=app --platforms=${{ matrix.create }} --project-name aec_example "$EXDIR"
          cd "$EXDIR"
          flutter pub add "aec_fullduplex:{\"path\":\"${PLUGIN_PATH}\"}"
          flutter build ${{ matrix.build }}

name: Deploy

# Auto-redeploy the web build to Vercel after CI passes on main. Runs only when
# the "CI" workflow completes successfully (so we never publish a red commit),
# and can also be triggered by hand. Mirrors ci.yml's sibling layout so the
# ../crisp_notation path dependency resolves, then builds web and ships it.
#
# Requires one repository secret: VERCEL_TOKEN (Account Settings → Tokens).
# The org/project IDs are not secret and are set below.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_uvAE8yHK3Zi7pXobhJmwckcQ
  VERCEL_PROJECT_ID: prj_USZwxfzmeGCORbJbiWwvddwWMaqX

jobs:
  deploy:
    # Manual runs always deploy; automatic runs only on a green CI.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cometbeat
        uses: actions/checkout@v5
        with:
          path: cometbeat
          # For an automatic run, deploy the exact commit CI validated.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # crisp_notation + crisp_notation_core are resolved via ../crisp_notation/... path deps.
      - name: Checkout crisp_notation (sibling path dependency)
        uses: actions/checkout@v5
        with:
          repository: CrispStrobe/crisp_notation
          ref: main
          path: crisp_notation

      # onnx_runtime_dart is a dev_dependency (headless AECMOS eval in bin/); pub
      # get resolves dev deps, so the sibling must be present even for the web build.
      - name: Checkout onnx_runtime_dart (sibling dev path dependency)
        uses: actions/checkout@v5
        with:
          repository: CrispStrobe/onnx_runtime_dart
          ref: main
          path: onnx_runtime_dart

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: cometbeat
        run: flutter pub get

      - name: Build web
        working-directory: cometbeat
        run: flutter build web --release

      # Vercel's outputDirectory is deploy_web (vercel.json). Drop the debug
      # symbolication maps the runtime never fetches (~8 MB) — same as the
      # local deploy flow.
      - name: Stage deploy_web
        working-directory: cometbeat
        run: |
          rm -rf deploy_web
          mkdir -p deploy_web
          rsync -a --exclude='*.symbols' build/web/ deploy_web/

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production
        working-directory: cometbeat
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

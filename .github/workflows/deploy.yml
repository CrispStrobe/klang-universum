name: Deploy

# Ships the web build to Vercel PRODUCTION only on a version TAG or a published
# GitHub Release (plus on demand via the Run button). Mirrors ci.yml's sibling
# layout so the ../crisp_notation path dependency resolves, then builds web and
# ships it. Continuous per-commit previews go to GitHub Pages (pages.yml).
#
# WHY TAGS, not every commit or a schedule: Vercel's free tier caps production
# deploys at 100/day. During heavy multi-agent development main gets far more
# than 100 settled commits/day, so deploying per-commit blew the quota
# ("Resource is limited … api-deployments-free-per-day", exit 1). Version tags /
# releases are rare (a handful/day at most), so they stay well under the cap and
# give Vercel a stable, intentional "release" cut — while Pages stays fresh on
# every commit. A manual dispatch is always available for an on-demand publish.
#
# Requires one repository secret: VERCEL_TOKEN (Account Settings → Tokens).
# The org/project IDs are not secret and are set below.

on:
  push:
    tags:
      - 'v*' # version tags, e.g. v1.2.3
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_uvAE8yHK3Zi7pXobhJmwckcQ
  VERCEL_PROJECT_ID: prj_USZwxfzmeGCORbJbiWwvddwWMaqX

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cometbeat
        uses: actions/checkout@v5
        with:
          path: cometbeat
          # Deploy the tagged / released commit (or the tip for a manual run).
          ref: ${{ github.sha }}

      # crisp_notation + crisp_notation_core are resolved via ../crisp_notation/... path deps.
      - name: Checkout crisp_notation (sibling path dependency)
        uses: actions/checkout@v5
        with:
          repository: CrispStrobe/crisp_notation
          ref: main
          path: crisp_notation

      # crispembed is a native FFI path dep (../CrispEmbed/flutter/crispembed);
      # pub get needs the sibling present even where the plugin isn't built.
      - name: Checkout CrispEmbed (sibling FFI path dependency)
        uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispEmbed
          ref: main
          path: CrispEmbed

      # onnx_runtime_dart is a dev_dependency (headless AECMOS eval in bin/); pub
      # get resolves dev deps, so the sibling must be present even for the web build.
      - name: Checkout onnx_runtime_dart (sibling dev path dependency)
        uses: actions/checkout@v5
        with:
          repository: CrispStrobe/onnx_runtime_dart
          ref: main
          path: onnx_runtime_dart

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: cometbeat
        run: flutter pub get

      - name: Build web
        working-directory: cometbeat
        # Bake the commit + build time into the app (About screen provenance).
        run: |
          flutter build web --release \
            --dart-define=GIT_COMMIT=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_TIME=$(date -u +%Y-%m-%dT%H:%MZ)

      # Vercel's outputDirectory is deploy_web (vercel.json). Drop the debug
      # symbolication maps the runtime never fetches (~8 MB) — same as the
      # local deploy flow.
      - name: Stage deploy_web
        working-directory: cometbeat
        run: |
          rm -rf deploy_web
          mkdir -p deploy_web
          rsync -a --exclude='*.symbols' build/web/ deploy_web/

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production
        working-directory: cometbeat
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

name: iOS Release (App Store)

# Builds, signs and uploads the iOS app to App Store Connect from CI.
#
# Triggers:
#   * push a tag matching v*        -> full build + upload (a real release)
#   * manual "Run workflow"         -> choose dry_run=true to build+sign WITHOUT
#                                      uploading (validates signing safely)
#
# Requires these repo secrets (all already set via `gh secret set`):
#   ASC_API_KEY_P8_BASE64  base64 of AuthKey_<KEYID>.p8
#   ASC_KEY_ID             App Store Connect API key id            (9RMU3C7422)
#   ASC_ISSUER_ID          App Store Connect issuer id
#   ASC_APP_ID             numeric app id                          (6789984849)
#   ASC_TEAM_ID            Apple Developer team id                 (N9XSJ4M3GT)
#   DIST_CERT_P12_BASE64   base64 of the "Apple Distribution" .p12 (cert + key)
#   DIST_CERT_PASSWORD     password for that .p12
#   ASC_PROFILE_BASE64     base64 of the IOS_APP_STORE .mobileprovision
#
# The build number comes from pubspec.yaml (version: x.y.z+BUILD). Bump BUILD
# before tagging, or Apple rejects a duplicate CFBundleVersion.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build & sign only, do NOT upload'
        type: boolean
        default: true

env:
  BUNDLE_ID: com.crispstrobe.klangUniversum
  PROFILE_NAME: Klang Universum AppStore CI
  FLUTTER_VERSION: '3.44.2'

jobs:
  build-upload:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Swift Package Manager (use pure CocoaPods)
        run: flutter config --no-enable-swift-package-manager

      - name: Resolve dependencies
        run: flutter pub get

      - name: Import signing certificate into a temp keychain
        env:
          P12_B64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          P12_PW: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$RUNNER_TEMP/nn-signing.keychain-db"
          KC_PW="ci-$(uuidgen)"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security create-keychain -p "$KC_PW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PW" "$KC"
          security import "$RUNNER_TEMP/dist.p12" -k "$KC" -P "$P12_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          # keep the default (login) keychain on the search list too
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PW" "$KC" >/dev/null
          security find-identity -v -p codesigning "$KC"

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.ASC_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/nn.mobileprovision"
          # Name the installed file by the profile's UUID and put it in BOTH the
          # legacy dir and the Xcode 16+/26 dir (Xcode moved this location).
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' \
            /dev/stdin <<<"$(security cms -D -i "$RUNNER_TEMP/nn.mobileprovision")")
          for DIR in "$HOME/Library/MobileDevice/Provisioning Profiles" \
                     "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            mkdir -p "$DIR"
            cp "$RUNNER_TEMP/nn.mobileprovision" "$DIR/$UUID.mobileprovision"
          done
          echo "installed profile UUID $UUID; name:"
          /usr/libexec/PlistBuddy -c 'Print :Name' \
            /dev/stdin <<<"$(security cms -D -i "$RUNNER_TEMP/nn.mobileprovision")"

      - name: Write App Store Connect API key
        env:
          P8_B64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys" .appstoreconnect
          echo "$P8_B64" | base64 --decode > ".appstoreconnect/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"
          cp ".appstoreconnect/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" "$HOME/.appstoreconnect/private_keys/"

      - name: Write ExportOptions.plist (manual signing)
        run: |
          cat > .appstoreconnect/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.ASC_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict><key>${{ env.BUNDLE_ID }}</key><string>${{ env.PROFILE_NAME }}</string></dict>
            <key>destination</key><string>export</string>
            <key>manageAppVersionAndBuildNumber</key><false/>
          </dict>
          </plist>
          EOF

      - name: Build & sign IPA (xcodebuild, manual signing)
        run: |
          set -euo pipefail
          # Let Flutter generate its ephemeral iOS config (Generated.xcconfig +
          # FlutterGeneratedPluginSwiftPackage) and the CocoaPods integration
          # WITHOUT building — this sets the Flutter.framework search paths that a
          # bare xcodebuild would otherwise miss in the SPM/CocoaPods hybrid.
          PATH="/usr/bin:$PATH" flutter build ios --release --config-only --no-codesign
          PATH="/usr/bin:$PATH" env -u GEM_HOME -u GEM_PATH -u RUBYOPT \
            pod install --project-directory=ios
          # ARCHIVE UNSIGNED. A bare `xcodebuild archive` insists on an iOS
          # *Development* profile for on-device signing, which CI can't have (only
          # the Distribution cert's private key is available, not a Development
          # one). Skip signing at archive time, then let -exportArchive apply the
          # Distribution signing (imported cert + installed App Store profile) —
          # the standard "sign at export" CI pattern. No account, no dev cert, no
          # -allowProvisioningUpdates (which churns certs).
          PATH="/usr/bin:$PATH" xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner \
            -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' \
            -archivePath build/ios/archive/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            clean archive
          PATH="/usr/bin:$PATH" xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist .appstoreconnect/ExportOptions.plist
          IPA=$(ls build/ios/ipa/*.ipa | head -1)
          echo "IPA=$IPA" >> "$GITHUB_ENV"
          echo "built: $IPA"
          unzip -qo "$IPA" -d /tmp/ipa_check
          codesign --verify --deep --strict --verbose=2 /tmp/ipa_check/Payload/Runner.app 2>&1 | tail -2

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: numbernebula-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload to App Store Connect
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          set -euo pipefail
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//; s/+.*//')
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "Uploading $VER (build $BUILD)"
          xcrun altool --upload-package "$IPA" --type ios \
            --apple-id "${{ secrets.ASC_APP_ID }}" \
            --bundle-id "${{ env.BUNDLE_ID }}" \
            --bundle-version "$BUILD" \
            --bundle-short-version-string "$VER" \
            --api-key "${{ secrets.ASC_KEY_ID }}" \
            --api-issuer "${{ secrets.ASC_ISSUER_ID }}"

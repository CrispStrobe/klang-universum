name: Pages

# Publishes the web build to GitHub Pages (https://crispstrobe.github.io/cometbeat/)
# on EVERY commit to main — the sibling of deploy.yml, which ships the same build
# to Vercel (but only on version tags). Pages has no per-day deploy quota, so it
# runs on every push; the `flutter build web` step self-gates a broken build (a
# failed build never deploys, so the last good site stays up), and
# cancel-in-progress means rapid commits just redeploy the latest. Also runnable
# by hand. It pushes the built site to the `gh-pages` branch (the Pages source).
#
# The project is served under /cometbeat/, so the web build sets that base href.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

permissions:
  contents: write # push the build to the gh-pages branch

jobs:
  pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cometbeat
        uses: actions/checkout@v5
        with:
          path: cometbeat
          # Deploy the pushed commit (or the current tip for a manual run).
          ref: ${{ github.sha }}

      # crisp_notation + crisp_notation_core resolve via ../crisp_notation/... path deps.
      - name: Checkout crisp_notation (sibling path dependency)
        uses: actions/checkout@v5
        with:
          repository: CrispStrobe/crisp_notation
          ref: main
          path: crisp_notation

      # onnx_runtime_dart is a dev_dependency (headless AECMOS eval in bin/); pub
      # get resolves dev deps, so the sibling must be present even for a web build.
      - name: Checkout onnx_runtime_dart (sibling dev path dependency)
        uses: actions/checkout@v5
        with:
          repository: CrispStrobe/onnx_runtime_dart
          ref: main
          path: onnx_runtime_dart

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: cometbeat
        run: flutter pub get

      # Project Pages serve at /cometbeat/, so the base href must match (an empty
      # or "/" base href would 404 every asset and blank the page).
      - name: Build web
        working-directory: cometbeat
        run: flutter build web --release --base-href /cometbeat/

      # Drop the debug symbolication maps the runtime never fetches (~8 MB), same
      # as the Vercel flow — keeps the gh-pages branch lean.
      - name: Stage site
        working-directory: cometbeat
        run: |
          rm -rf pages_site
          mkdir -p pages_site
          rsync -a --exclude='*.symbols' build/web/ pages_site/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: cometbeat/pages_site
          publish_branch: gh-pages
          # A Flutter web build has no Jekyll; .nojekyll is added by default.
          commit_message: "Deploy web build to Pages (${{ github.sha }})"

name: aec_fullduplex
description: >-
  Native full-duplex acoustic echo cancellation for Klang Universum — a
  miniaudio (MIT-0) duplex host plus our own MIT echo-canceller core (a C port
  of lib/core/audio/echo_canceller.dart). A Flutter FFI plugin; deliberately NOT
  a dependency of the app until it builds green on every CI platform (see
  docs/AEC_TIER3B.md).
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    # FFI plugin: the tooling builds + bundles the native code (no method
    # channels / platform classes). The C is shared across platforms via
    # src/CMakeLists.txt (Android/Linux/Windows) and the podspec Classes/
    # forwarders (macOS/iOS).
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true

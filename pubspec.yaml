name: comet_beat
description: A music notation and harmony learning app, from primary school kids onwards. Working title CometBeat.
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.5.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # Pure-Dart ONNX runtime (no FFI, runs on web/WASM). Used by the polyphonic
  # transcriber (lib/core/audio/transcription/basic_pitch.dart, Worker 3 — which
  # is web-safe: it imports only the core lib and takes a preloaded model) and
  # the headless AECMOS eval (bin/aecmos.dart). dart:io is confined to the model
  # STORE (basic_pitch_model_store.dart, download/cache) — native callers only.
  # Sibling path dep (CI/deploy check out CrispStrobe/onnx_runtime_dart too).
  onnx_runtime_dart:
    path: ../onnx_runtime_dart
  # Native ONNX Runtime via FFI (Flutter plugin — desktop/mobile only, NOT web
  # and NOT `dart run`). The "onnxFfi" backend of the transcription decision
  # framework: the SAME .onnx models (CREPE/RMVPE/Basic-Pitch/BTC) on native ORT
  # for a GPU-accelerated in-app path. Confined to the onnx_ffi_* providers
  # behind a conditional import; absent ⇒ the resolver falls back to the pure-
  # Dart onnx_runtime_dart path. onnxruntime 1.4.1 is MIT (sdk >=2.17 <4.0).
  onnxruntime: ^1.4.1
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # UI
  cupertino_icons: ^1.0.6

  # Storage & Data
  shared_preferences: ^2.2.2

  # Audio
  audioplayers: ^6.1.0
  # Real-time, low-latency polyphonic voice for the Perform play-in keyboard/pads
  # (the "3" of the feel/instrument arc). Used ONLY behind LiveVoiceEngine's
  # capability hook (core/services/live_voice.dart) with graceful degrade to the
  # audioplayers pool — if it can't init (unsupported platform / headless test),
  # playback falls back and nothing breaks.
  flutter_soloud: ^3.1.10

  # Files (import of MIDI etc.)
  file_selector: ^1.0.3

  # PDF export (Workshop): pure-Dart PDF writer. We compose pages ourselves from
  # per-system PNGs — see lib/features/workshop/export/score_pdf.dart.
  pdf: ^3.11.0

  # Utils
  intl: any
  equatable: ^2.0.5
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  http: ^1.2.0
  xml: ^6.5.0
  # Already pulled in transitively (crisp_notation reads .mxl); promoted to a
  # direct dep because the Sample Extractor imports sample PACKS with it.
  # MIT + pure Dart (so it works on web too): Zip/Tar/GZip/BZip2/XZ. It does
  # NOT do 7z — see the explicit .7z error in sample_extractor.dart.
  archive: ^4.0.0

  # Notation rendering — path dep on the local library workspace, which tracks
  # main ahead of the pub.dev releases (see ../crisp_notation/docs/CONTRACT.md).
  crisp_notation:
    path: ../crisp_notation/packages/crisp_notation
  # The pure model + MusicXML writer, imported Flutter-free by the transcription
  # CLI (bin/listen.dart --transcribe) and transcription/transcribe.dart so the
  # whole pipeline runs under `dart run`. Pinned to the path by the override.
  crisp_notation_core: any
  record: ^7.1.1
  # Platform text-to-speech (AVSpeechSynthesizer / Android TTS / web
  # SpeechSynthesis) — on-device, offline, free de+en voices. Reached only
  # through core/services/tts_service.dart (the sole plugin-facing file), which
  # abstracts a TtsBackend so the neural backend (crispasr, below) can slot in.
  # Narrates lesson/primer text for pre-readers + accessibility.
  flutter_tts: ^4.2.2
  # CrispASR — on-device NEURAL ggml, TWO uses (both pure-Dart FFI over
  # libcrispasr; pub-get/analyze/test need no native lib — it's
  # DynamicLibrary.open'd only when the feature runs, else we fall back):
  #   • TTS backend (Kokoro, Apache-2.0, de+en) — core/audio/tts/…
  #   • CREPE F0 (0.8.16+ CrispasrSession.pitch, cstr/crepe-GGUF) — the ggml
  #     backend of the transcription framework, core/audio/transcription/
  #     crispasr_ffi_pitch.dart; null when the lib/model absent → resolver falls
  #     back to the pure-Dart onnx / CLI paths.
  # Models are registry-resolved + downloaded on first use, never bundled.
  # Native lib bundling: macOS first.
  crispasr: ^0.8.17
  # AEC Tier 3b native full-duplex echo canceller (in-repo Flutter FFI plugin).
  # Used only on native platforms + only when speaker-backing AEC is wanted;
  # reached exclusively through core/audio/aec_capability.dart, whose web build
  # gets a dart:ffi-free stub. See docs/AEC_TIER3B.md.
  aec_fullduplex:
    path: native/aec
  # FFI helpers (allocators) for the native glint Vorbis decoder that backs the
  # .sf3 SoundFont path (native only; web uses a wasm/stub seam). See
  # docs/GLINT_VORBIS_HANDOVER.md + core/audio/sf2/.
  ffi: ^2.1.0
  # OMR (optical music recognition): photograph/scan sheet music → a Score. The
  # crispembed Flutter FFI plugin runs the CrispEmbed ggml engine (native only —
  # web gets a stub); `image` decodes the picture to raw pixels; `image_picker`
  # supplies the camera + gallery. The GGUF model downloads on demand (consent-
  # gated), the token→Score parse is pure-Dart in crisp_notation_core.
  crispembed:
    path: ../CrispEmbed/flutter/crispembed
  image: ^4.2.0
  image_picker: ^1.1.2
  # Native Ogg-Vorbis DECODER (glint, MIT) compiled into the app as an FFI
  # plugin → makes .sf3 SoundFonts decodable on native. Reached ONLY through
  # core/audio/sf2/vorbis_capability.dart (web gets the dart:ffi-free stub); the
  # decoder degrades gracefully to null if the plugin isn't built. Re-vendor the
  # glint sources with native/glint/sync_glint.sh.
  glint_vorbis:
    path: native/glint

# crisp_notation_core is published (0.4.3), but the path dep above tracks main,
# which runs ahead of it — pin core to the same workspace so the two never
# resolve to different versions. Drop this once mus depends on pub.dev releases.
dependency_overrides:
  crisp_notation_core:
    path: ../crisp_notation/packages/crisp_notation_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  # Test-only: fake the file picker to drive the import file-pick paths.
  file_selector_platform_interface: ^2.7.0
  plugin_platform_interface: ^2.1.8
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#5E35B1"
    theme_color: "#5E35B1"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  generate: true # ARB-based i18n, see l10n.yaml

  assets:
    - assets/images/
    - assets/sounds/
    # Bundled CC0 percussion one-shots (VCSL, public domain) for the tracker's
    # sound library — see assets/sounds/percussion/LICENSE.txt.
    - assets/sounds/percussion/
    # Selectable SMuFL faces (Petaluma, Leland, Leipzig — all SIL OFL 1.1) with
    # their glyph metadata + license, loaded at runtime by the notation-font
    # setting. (Bravura, the default, is bundled by crisp_notation.)
    - assets/smufl/
    # CC0 GregoBase Gregorian-chant index (id/title/office/mode) for the
    # "Gregorian Chant" library source; each .gabc is fetched on import.
    - assets/library/gregobase_index.json

  fonts:
    - family: Petaluma
      fonts:
        - asset: assets/smufl/Petaluma.otf
    - family: Leland
      fonts:
        - asset: assets/smufl/Leland.otf
    - family: Leipzig
      fonts:
        - asset: assets/smufl/Leipzig.ttf

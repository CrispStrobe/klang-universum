name: klang_universum
description: A music notation and harmony learning app, from primary school kids onwards. Working title KlangUniversum.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # UI
  cupertino_icons: ^1.0.6

  # Storage & Data
  shared_preferences: ^2.2.2

  # Audio
  audioplayers: ^6.1.0

  # Files (import of MIDI etc.)
  file_selector: ^1.0.3

  # Utils
  intl: any
  equatable: ^2.0.5
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

  # Notation rendering — path dep on the local library workspace
  # (see ../crisp_notation-public/HANDOVER.md).
  crisp_notation:
    path: ../crisp_notation-public/packages/crisp_notation
  record: ^7.1.1
  # AEC Tier 3b native full-duplex echo canceller (in-repo Flutter FFI plugin).
  # Used only on native platforms + only when speaker-backing AEC is wanted;
  # reached exclusively through core/audio/aec_capability.dart, whose web build
  # gets a dart:ffi-free stub. See docs/AEC_TIER3B.md.
  aec_fullduplex:
    path: native/aec

# crisp_notation_core is not on pub.dev yet; resolve it from the workspace too.
# Remove this override once the crisp_notation packages are published.
dependency_overrides:
  crisp_notation_core:
    path: ../crisp_notation-public/packages/crisp_notation_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  # Test-only: fake the file picker to drive the import file-pick paths.
  file_selector_platform_interface: ^2.7.0
  plugin_platform_interface: ^2.1.8

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#5E35B1"
    theme_color: "#5E35B1"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  generate: true # ARB-based i18n, see l10n.yaml

  assets:
    - assets/images/
    - assets/sounds/
    # Petaluma (jazz/handwritten SMuFL font, SIL OFL 1.1) — its glyph metadata
    # + license, loaded at runtime for the "Handwritten notes" theme.
    - assets/smufl/

  fonts:
    - family: Petaluma
      fonts:
        - asset: assets/smufl/Petaluma.otf

# Static analysis configuration. See https://dart.dev/tools/analysis and
# https://dart.dev/lints. Run locally with `flutter analyze`; CI enforces it.

include: package:flutter_lints/flutter.yaml

analyzer:
  # Treat implicit-cast/dynamic holes as errors — this codebase is already
  # clean, so lock the floor in now rather than retrofitting later.
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Missed awaits and dangling futures are real bugs in an async audio app.
    unawaited_futures: error
    # A deprecated API in our own code should block, not warn silently.
    deprecated_member_use_from_same_package: warning
  exclude:
    - lib/l10n/app_localizations*.dart # generated
    - lib/**.g.dart

linter:
  rules:
    # Correctness / async. (discarded_futures is deliberately omitted: it flags
    # intentional fire-and-forget audio playback on every tap.)
    - unawaited_futures
    - avoid_slow_async_io
    - cancel_subscriptions
    - close_sinks
    - always_use_package_imports
    # Style consistency across the sibling app family
    - prefer_single_quotes
    - directives_ordering
    - prefer_final_locals
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - unnecessary_parenthesis
    - unnecessary_lambdas
    - use_super_parameters
    - sort_child_properties_last
    - avoid_redundant_argument_values
    - require_trailing_commas
